<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OFFBEAT Parcel Management</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="baby">
        
    <!-- Animated Background -->

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>
    <div class="bg-circle circle3"></div>


    <!-- Mobile Container -->

    <div class="mobile-container">

        <!-- Header -->

        <header>

            <div class="logo-box">

                <img src="images/logo.png" alt="OFFBEAT Logo">

            </div>

            <div class="title">

                <h2>OFFBEAT</h2>

                <p>Parcel Management</p>

            </div>

        </header>


        <!-- Welcome Card -->

        <section class="welcome-card">

            <h3>Hello 👋</h3>

            <p>
                Welcome to OFFBEAT Parcel Management System
            </p>

        </section>


        <!-- Statistics -->

        <section class="stats">

            <div class="card">

                <i class="fa-solid fa-box"></i>

                <h2 id="todayParcel">0</h2>

                <span>Today's Parcels</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-clock"></i>

                <h2 id="pendingParcel">0</h2>

                <span>Pending</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-truck"></i>

                <h2 id="shippedParcel">0</h2>

                <span>Shipped</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-users"></i>

                <h2 id="customerCount">0</h2>

                <span>Customers</span>

            </div>

        </section>


        <!-- Quick Actions -->

        <section class="quick-actions">

            <h3>Quick Actions</h3>

            <div class="action-grid">

                <a href="new-parcel.html" class="action-card">

                    <i class="fa-solid fa-plus"></i>

                    <span>New Parcel</span>

                </a>

                <a href="history.html" class="action-card">

                    <i class="fa-solid fa-clock-rotate-left"></i>

                    <span>History</span>

                </a>

                <a href="label-v2.html" class="action-card">

                    <i class="fa-solid fa-print"></i>

                    <span>Print Label</span>

                </a>

                <a href="#" class="action-card">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <span>Search</span>

                </a>

            </div>

        </section>


        <!-- Recent Orders -->

        <section class="recent-orders">

            <div class="section-title">

                <h3>Recent Orders</h3>

                <a href="history.html">View All</a>

            </div>

            <div class="order-list" id="recentOrders"></div>

        </section>

    </div>



    <!-- Floating Button -->

    <a href="new-parcel.html" class="fab">

        <i class="fa-solid fa-plus"></i>

    </a>



    <!-- Bottom Navigation -->

    <nav>

        <a href="index.html" class="active">

            <i class="fa-solid fa-house"></i>

            <span>Home</span>

        </a>

        <a href="history.html">

            <i class="fa-solid fa-box"></i>

            <span>Orders</span>

        </a>

        <a href="new-parcel.html">

            <i class="fa-solid fa-square-plus"></i>

            <span>New</span>

        </a>

        <a href="label-v2.html">

            <i class="fa-solid fa-print"></i>

            <span>Label</span>

        </a>

        <a href="settings.html">

            <i class="fa-solid fa-gear"></i>

            <span>Settings</span>

        </a>

    </nav>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
